kind = "web"
previewPath = "/"
title = "منصة الخياطة الكويتية"
version = "1.0.0"
id = "artifacts/tailoring-saas"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 24249
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/tailoring-saas run dev"

[services.env]
PORT = "24249"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/tailoring-saas", "run", "build"]
publicDir = "artifacts/tailoring-saas/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
